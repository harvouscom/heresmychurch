# Netlify configuration
# See https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "dist"
  command = "pnpm run build"

# Edge function: inject detected US state into HTML for state preselection (uses context.geo)
[[edge_functions]]
  function = "geo-inject"
  path = "/*"

# Edge function: rewrite HTML meta tags for social crawlers so they get per-page OG images
[[edge_functions]]
  function = "og-rewrite"
  path = "/state/*"

[[edge_functions]]
  function = "og-rewrite"
  path = "/report/*"
