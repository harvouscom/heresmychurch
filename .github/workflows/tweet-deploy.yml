name: Queue Deploy Tweet

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/**'

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Queue deploy tweet
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TWITTER_WEBHOOK_SECRET: ${{ secrets.TWITTER_WEBHOOK_SECRET }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s | head -c 180)
          # Only queue when commit is user-facing: feat:, fix:, or contains tweet:
          if echo "$COMMIT_MSG" | grep -qiE '^(feat|fix):|tweet:'; then
            curl -sf -X POST "${SUPABASE_FUNCTION_URL}/twitter/queue-deploy" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              -d "$(jq -n --arg s "$TWITTER_WEBHOOK_SECRET" --arg m "$COMMIT_MSG" \
                '{secret: $s, message: $m}')" \
              || echo "Queue deploy tweet failed (non-fatal)"
          fi
